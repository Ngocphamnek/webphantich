kind = "web"
previewPath = "/"
title = "AI Web Scout"
version = "1.0.0"
id = "artifacts/web-scout"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20045

[services.development]
run = "pnpm --filter @workspace/web-scout run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-scout", "run", "build" ]
publicDir = "artifacts/web-scout/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20045"
BASE_PATH = "/"
